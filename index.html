<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff CRM</title>
  <style>
    :root {
      --bg: #dce6f0;
      --glass: rgba(255,255,255,0.58);
      --glass-mid: rgba(255,255,255,0.72);
      --glass-high: rgba(255,255,255,0.86);
      --glass-border: rgba(255,255,255,0.65);
      --shadow: 0 8px 32px rgba(15,23,42,0.10), 0 2px 8px rgba(15,23,42,0.06);
      --shadow-lg: 0 20px 60px rgba(15,23,42,0.13), 0 4px 16px rgba(15,23,42,0.08);
      --panel: rgba(255,255,255,0.68);
      --line: rgba(160,185,215,0.4);
      --line-solid: #cdd8e8;
      --text: #1a2332;
      --muted: #5a6a7e;
      --light: #8fa3b8;
      --primary: #2563eb;
      --danger: #dc2626;
      --warn: #d97706;
      --ok: #059669;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 22px;
      --blur: blur(20px) saturate(180%);
      --blur-sm: blur(10px) saturate(150%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: linear-gradient(140deg, #b8cfe8 0%, #c8daf0 25%, #dce8f5 50%, #cad9ee 75%, #b5cae0 100%);
      min-height: 100vh;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Inter, sans-serif;
      color: var(--text);
      background: transparent;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex; gap: 8px; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--glass-border);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 0 rgba(255,255,255,0.8), 0 4px 20px rgba(15,23,42,0.07);
    }
    .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

    /* ─── ACTIONS & BUTTONS ─── */
    .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    button {
      border: 1px solid rgba(160,185,215,0.55);
      background: rgba(255,255,255,0.62);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 7px 13px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s ease;
      box-shadow: 0 1px 4px rgba(15,23,42,0.07), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    button:hover { background: rgba(255,255,255,0.88); box-shadow: 0 3px 10px rgba(15,23,42,0.10), inset 0 1px 0 rgba(255,255,255,0.9); transform: translateY(-1px); }
    button:active { transform: translateY(0); box-shadow: 0 1px 3px rgba(15,23,42,0.08); }
    button.primary {
      background: linear-gradient(145deg, #4f90f7, #2563eb);
      border-color: rgba(37,99,235,0.3);
      color: #fff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.32), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    button.primary:hover { background: linear-gradient(145deg, #60a5fa, #3b82f6); box-shadow: 0 6px 20px rgba(37,99,235,0.4), inset 0 1px 0 rgba(255,255,255,0.25); }

    /* ─── SCREENS ─── */
    .screen { display: none; height: calc(100vh - 53px); }
    .screen.active { display: flex; }
    .crm-layout { width: 100%; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 320px; min-width: 280px; max-width: 360px;
      background: rgba(255,255,255,0.48);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-right: 1px solid var(--glass-border);
      display: flex; flex-direction: column;
    }
    .main { flex: 1; padding: 14px; overflow: auto; }
    .filters { padding: 10px 12px; border-bottom: 1px solid var(--line); display: grid; gap: 7px; background: rgba(255,255,255,0.35); }

    /* ─── INPUTS ─── */
    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(160,185,215,0.5);
      border-radius: var(--radius-sm);
      padding: 8px 11px;
      font-size: 13px;
      background: rgba(255,255,255,0.68);
      backdrop-filter: blur(8px);
      color: var(--text);
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s, background .15s;
      outline: none;
      box-shadow: inset 0 1px 3px rgba(15,23,42,0.05);
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(37,99,235,0.45);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10), inset 0 1px 3px rgba(15,23,42,0.04);
      background: rgba(255,255,255,0.90);
    }
    textarea { min-height: 68px; resize: vertical; }

    /* ─── CHIPS ─── */
    .team-counters { display: flex; gap: 5px; flex-wrap: wrap; padding: 7px 12px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.28); }
    .chip { background: rgba(99,102,241,0.10); color: #4338ca; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 600; border: 1px solid rgba(99,102,241,0.18); }

    /* ─── EMPLOYEE LIST ─── */
    .employee-list { overflow: auto; padding: 7px; }
    .employee-card {
      border: 1px solid rgba(190,210,230,0.55);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 6px;
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.50);
      backdrop-filter: blur(10px);
      transition: all .15s;
      box-shadow: 0 1px 4px rgba(15,23,42,0.05);
    }
    .employee-card:hover { background: rgba(255,255,255,0.80); box-shadow: 0 4px 16px rgba(15,23,42,0.09); transform: translateY(-1px); }
    .employee-card.active { outline: 2px solid rgba(37,99,235,0.35); background: rgba(255,255,255,0.80); box-shadow: 0 4px 16px rgba(37,99,235,0.10); }
    .avatar { width:40px; height:40px; border-radius:50%; color:#fff; font-weight:700; display:flex; align-items:center; justify-content:center; user-select:none; font-size:14px; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
    .emp-name { font-weight: 600; font-size: 13px; }
    .muted { color: var(--muted); font-size: 12px; }
    .loadbar { margin-top: 5px; height: 5px; border-radius: 999px; background: rgba(0,0,0,0.08); overflow: hidden; }
    .loadbar > span { display: block; height: 100%; border-radius: 999px; }
    .review-alert { margin-top: 4px; font-size: 11px; font-weight: 600; display: inline-block; padding: 2px 8px; border-radius: 999px; }
    .review-alert.warn { background: rgba(217,119,6,0.12); color: #92400e; border: 1px solid rgba(217,119,6,0.22); }
    .review-alert.danger { background: rgba(220,38,38,0.10); color: #991b1b; border: 1px solid rgba(220,38,38,0.18); }

    /* ─── GLASS PANEL ─── */
    .empty { border: 1px dashed rgba(160,185,215,0.6); border-radius: var(--radius); padding: 16px; color: var(--muted); background: rgba(255,255,255,0.35); }
    .panel {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    /* ─── TABS ─── */
    .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .tab-btn { font-size: 12px; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.45); border: 1px solid rgba(160,185,215,0.38); color: var(--muted); box-shadow: none; }
    .tab-btn:hover { background: rgba(255,255,255,0.75); color: var(--text); transform: none; box-shadow: none; }
    .tab-btn.active { background: rgba(37,99,235,0.12); border-color: rgba(37,99,235,0.28); color: #1d4ed8; font-weight: 600; box-shadow: none; }

    /* ─── GRID & FIELDS ─── */
    .grid-2, .grid-3 { display: grid; gap: 10px; margin-bottom: 10px; }
    .grid-2 { grid-template-columns: repeat(2,minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3,minmax(0,1fr)); }
    .field label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .calc { font-size: 12px; color: var(--text); margin-top: 4px; background: rgba(255,255,255,0.48); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; }
    .section-title { font-size: 13px; font-weight: 700; margin: 14px 0 8px; }

    /* ─── TABLE ─── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
    th, td { border: 1px solid var(--line-solid); padding: 7px 8px; vertical-align: top; }
    th { background: rgba(255,255,255,0.48); text-align: left; font-weight: 600; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    td { background: rgba(255,255,255,0.32); }
    tr:hover td { background: rgba(255,255,255,0.58); }
    .row-actions { display: flex; justify-content: flex-end; }
    .danger-text { color: var(--danger); font-weight: 700; }
    .status-overdue td { background: rgba(220,38,38,0.05) !important; }

    /* ─── KPI / DASHBOARD ─── */
    .stats { padding: 14px; width: 100%; overflow: auto; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
    .kpi {
      background: var(--glass-mid);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .kpi .v { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px; }
    .kpi.good .v { color: var(--ok); }
    .kpi.warn .v { color: var(--warn); }
    .kpi.danger .v { color: var(--danger); }
    .dash-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
    .dash-grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }

    /* ─── BADGES ─── */
    .badge { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge.good { background: rgba(5,150,105,0.11); color: #065f46; border: 1px solid rgba(5,150,105,0.2); }
    .badge.warn { background: rgba(217,119,6,0.11); color: #92400e; border: 1px solid rgba(217,119,6,0.2); }
    .badge.danger { background: rgba(220,38,38,0.10); color: #991b1b; border: 1px solid rgba(220,38,38,0.18); }

    /* ─── LINKS & DASH ITEMS ─── */
    .employee-link { border: 0; background: transparent; color: var(--primary); cursor: pointer; padding: 0; font-weight: 600; text-align: left; box-shadow: none; transform: none; backdrop-filter: none; font-size: inherit; }
    .employee-link:hover { text-decoration: underline; transform: none; box-shadow: none; background: transparent; }
    .dash-card-list { display: grid; gap: 6px; margin-bottom: 8px; }
    .dash-item { border: 1px solid var(--line-solid); border-radius: 10px; padding: 9px 11px; background: rgba(255,255,255,0.48); }
    .dash-item.danger { border-color: rgba(220,38,38,0.22); background: rgba(220,38,38,0.04); }
    .dash-item.warn { border-color: rgba(217,119,6,0.22); background: rgba(217,119,6,0.04); }
    .dash-item.good { border-color: rgba(5,150,105,0.22); background: rgba(5,150,105,0.04); }
    .last-meeting-row td { background: rgba(5,150,105,0.05) !important; }
    .loadbar.compact { margin-top: 4px; height: 5px; }
    .list { margin: 0; padding-left: 16px; }
    .list li { margin-bottom: 5px; font-size: 13px; }
    .dots { letter-spacing: 2px; color: #f59e0b; font-size: 14px; }

    /* ─── CALENDAR ─── */
    .calendar-screen { padding: 14px; width: 100%; overflow: auto; }
    .calendar-grid { display: grid; grid-template-columns: 200px repeat(92,minmax(11px,1fr)); gap: 1px; align-items: center; min-width: 1200px; background: rgba(160,185,215,0.25); border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .cal-cell { background: rgba(255,255,255,0.50); min-height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .cal-name { justify-content: flex-start; padding: 0 8px; font-weight: 600; font-size: 12px; color: var(--text); position: sticky; left: 0; z-index: 1; background: rgba(255,255,255,0.80); }
    .cal-head { background: rgba(255,255,255,0.65); font-weight: 700; color: var(--muted); font-size: 10px; }
    .cal-vac { background: rgba(37,99,235,0.16); }
    .cal-sick { background: rgba(220,38,38,0.16); }
    .cal-today { outline: 2px solid var(--primary); outline-offset: -2px; }
    .capacity-low { background: rgba(220,38,38,0.12); color: #991b1b; font-weight: 700; }

    /* ─── DEVELOPMENT ─── */
    .dev-columns { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
    .skill-lvl-low { background: rgba(220,38,38,0.10); color: #991b1b; font-weight: 700; text-align: center; border-radius: 5px; }
    .skill-lvl-mid { background: rgba(217,119,6,0.10); color: #92400e; font-weight: 700; text-align: center; border-radius: 5px; }
    .skill-lvl-high { background: rgba(5,150,105,0.10); color: #065f46; font-weight: 700; text-align: center; border-radius: 5px; }
    .team-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

    /* ─── SETTINGS ─── */
    .settings-layout { padding: 14px; width: 100%; overflow: auto; }
    .settings-grid { display: grid; gap: 10px; grid-template-columns: 2fr 1fr; }
    .team-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid var(--line-solid); border-radius: 10px; padding: 9px 12px; background: rgba(255,255,255,0.52); margin-bottom: 6px; }
    .team-row-left { display: flex; align-items: center; gap: 8px; }
    .team-actions { display: flex; gap: 6px; }
    .btn-small { padding: 4px 8px; font-size: 12px; }

    /* ─── IMPORT MODAL ─── */
    .import-modal { position: fixed; inset: 0; background: rgba(15,23,42,0.30); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 80; }
    .import-modal.active { display: flex; }
    .import-card { width: min(1000px,95vw); max-height: 88vh; overflow: auto; background: rgba(255,255,255,0.88); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-radius: var(--radius-lg); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg); padding: 20px; }

    /* ─── BELL ─── */
    .bell-wrap { position: relative; }
    .bell-btn { position: relative; background: rgba(255,255,255,0.58); backdrop-filter: var(--blur-sm); border: 1px solid rgba(160,185,215,0.48); border-radius: var(--radius-sm); padding: 6px 10px; cursor: pointer; font-size: 17px; line-height: 1; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(15,23,42,0.07), inset 0 1px 0 rgba(255,255,255,0.7); }
    .bell-badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: #fff; border-radius: 999px; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; display: flex; align-items: center; justify-content: center; padding: 0 3px; border: 2px solid rgba(255,255,255,0.9); }
    .bell-badge:empty { display: none; }
    .bell-dropdown { position: absolute; right: 0; top: calc(100% + 8px); width: 360px; max-height: 480px; overflow-y: auto; background: rgba(255,255,255,0.86); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 200; display: none; }
    .bell-dropdown.open { display: block; }
    .bell-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.55); border-radius: var(--radius) var(--radius) 0 0; position: sticky; top: 0; }
    .bell-mark-all { font-size: 11px; color: var(--primary); background: transparent; border: none; cursor: pointer; box-shadow: none; transform: none; backdrop-filter: none; padding: 2px 6px; }
    .bell-item { display: flex; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .1s; }
    .bell-item:hover { background: rgba(255,255,255,0.68); }
    .bell-item.read { opacity: .42; }
    .bell-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .bell-dot.red { background: var(--danger); } .bell-dot.yellow { background: var(--warn); } .bell-dot.blue { background: var(--primary); }
    .bell-item-body { flex: 1; }
    .bell-item-text { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .bell-item-sub { font-size: 11px; color: var(--muted); }
    .bell-item-read { font-size: 11px; color: var(--muted); background: transparent; border: none; cursor: pointer; flex-shrink: 0; box-shadow: none; transform: none; backdrop-filter: none; padding: 2px 4px; }
    .bell-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ─── LOADING / SAVE ─── */
    .loading-banner { position: fixed; bottom: 16px; right: 16px; background: rgba(26,35,50,0.82); backdrop-filter: blur(10px); color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 999; display: none; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12); }
    .loading-banner.show { display: block; }
    .save-indicator { position: fixed; bottom: 16px; right: 16px; background: rgba(5,150,105,0.88); backdrop-filter: blur(10px); color: #fff; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; box-shadow: var(--shadow); }
    .save-indicator.show { opacity: 1; }

    /* ─── PERSONAL ─── */
    .personal-layout { padding: 16px; width: 100%; overflow: auto; }
    .projects-layout { padding: 16px; width: 100%; overflow: auto; }
    .pg-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; margin-bottom: 12px; }
    .pg-grid-2 { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; margin-bottom: 12px; }
    .focus-block {
      background: linear-gradient(135deg, rgba(30,58,138,0.80), rgba(29,78,216,0.70));
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--radius); padding: 16px; color: #fff; margin-bottom: 14px;
      box-shadow: 0 8px 32px rgba(37,99,235,0.22), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .focus-block h2 { font-size: 11px; font-weight: 600; margin-bottom: 10px; opacity: .7; text-transform: uppercase; letter-spacing: .08em; }
    .focus-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.10); }
    .focus-item:last-child { border-bottom: none; }
    .focus-item input[type=checkbox] { width: 18px; height: 18px; accent-color: #60a5fa; flex-shrink: 0; cursor: pointer; }
    .focus-text { flex: 1; font-size: 14px; font-weight: 500; background: transparent; border: none; color: #fff; outline: none; box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .focus-text::placeholder { color: rgba(255,255,255,0.40); }
    .focus-text.done { text-decoration: line-through; opacity: .5; }
    .p-section { margin-bottom: 14px; }
    .p-section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .p-section-title { font-size: 13px; font-weight: 700; }
    .p-add-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px dashed rgba(140,170,210,0.65); background: rgba(255,255,255,0.38); color: var(--muted); cursor: pointer; box-shadow: none; }
    .p-add-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(37,99,235,0.07); transform: none; box-shadow: none; }
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.55); backdrop-filter: blur(10px); border: 1px solid rgba(190,210,230,0.52); border-radius: 10px; margin-bottom: 6px; transition: all .15s; }
    .task-item:hover { background: rgba(255,255,255,0.80); box-shadow: 0 3px 12px rgba(15,23,42,0.08); }
    .task-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--primary); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .task-item-body { flex: 1; }
    .task-item-text { font-size: 13px; font-weight: 500; background: transparent; border: none; outline: none; width: 100%; color: var(--text); font-family: inherit; box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .task-item-text.done { text-decoration: line-through; color: var(--muted); }
    .task-item-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .task-item-meta select, .task-item-meta input[type=date] { width: auto; padding: 3px 7px; font-size: 11px; border-radius: 6px; }
    .task-del { font-size: 12px; color: var(--muted); background: transparent; border: none; cursor: pointer; flex-shrink: 0; box-shadow: none; transform: none; backdrop-filter: none; padding: 2px 4px; }
    .task-del:hover { color: var(--danger); transform: none; box-shadow: none; background: transparent; }
    .note-card { background: rgba(255,255,255,0.55); backdrop-filter: blur(10px); border: 1px solid rgba(190,210,230,0.52); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .note-card textarea { width: 100%; border: none; outline: none; font-size: 13px; font-family: inherit; color: var(--text); resize: none; min-height: 60px; background: transparent; box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .note-card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .note-date { font-size: 11px; color: var(--muted); }
    .note-del { font-size: 11px; color: var(--muted); background: transparent; border: none; cursor: pointer; box-shadow: none; transform: none; backdrop-filter: none; padding: 2px 4px; }
    .note-del:hover { color: var(--danger); transform: none; }
    .habit-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(255,255,255,0.52); border: 1px solid rgba(190,210,230,0.50); border-radius: 10px; margin-bottom: 6px; }
    .habit-name { flex: 0 0 140px; width: 140px; font-size: 13px; font-weight: 500; background: transparent; border: none; outline: none; font-family: inherit; color: var(--text); box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .habit-days { display: flex; gap: 4px; }
    .habit-day { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(160,185,215,0.55); background: rgba(255,255,255,0.48); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all .15s; box-shadow: none; backdrop-filter: none; }
    .habit-day:hover { border-color: var(--primary); color: var(--primary); transform: none; box-shadow: none; background: rgba(37,99,235,0.08); }
    .habit-day.done { background: var(--ok); border-color: var(--ok); color: #fff; box-shadow: 0 2px 8px rgba(5,150,105,0.28); }
    .habit-del { font-size: 11px; color: var(--muted); background: transparent; border: none; cursor: pointer; box-shadow: none; transform: none; backdrop-filter: none; padding: 2px 4px; }
    .habit-del:hover { color: var(--danger); transform: none; }
    .goal-row { display: grid; grid-template-columns: 1fr auto auto 90px 110px auto; gap: 8px; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.52); border: 1px solid rgba(190,210,230,0.50); border-radius: 10px; margin-bottom: 6px; }
    .goal-text { font-size: 13px; font-weight: 500; background: transparent; border: none; outline: none; font-family: inherit; color: var(--text); width: 100%; box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .goal-pct { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 32px; text-align: right; }

    /* ─── PROJECTS ─── */
    .proj-card {
      background: rgba(255,255,255,0.60);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      border-left: 4px solid rgba(148,163,184,0.55);
      box-shadow: var(--shadow); transition: box-shadow .2s, transform .15s;
    }
    .proj-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .proj-card.active { border-left-color: var(--primary); }
    .proj-card.paused { border-left-color: var(--warn); }
    .proj-card.done { border-left-color: var(--ok); opacity: .75; }
    .proj-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .proj-name { font-size: 16px; font-weight: 700; flex: 1; background: transparent; border: none; outline: none; font-family: inherit; color: var(--text); box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .proj-status-sel { padding: 5px 9px; font-size: 12px; border-radius: 8px; border: 1px solid rgba(160,185,215,0.48); font-family: inherit; background: rgba(255,255,255,0.58); cursor: pointer; width: auto; }
    .proj-del { font-size: 12px; color: var(--danger); background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.18); border-radius: 8px; padding: 4px 10px; cursor: pointer; box-shadow: none; }
    .proj-del:hover { background: rgba(220,38,38,0.12); transform: none; box-shadow: none; }
    .proj-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
    .proj-field { display: flex; flex-direction: column; gap: 3px; }
    .proj-field label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .proj-field input, .proj-field select, .proj-field textarea { padding: 7px 9px; border: 1px solid rgba(160,185,215,0.48); border-radius: 8px; font-size: 13px; background: rgba(255,255,255,0.62); color: var(--text); font-family: inherit; }
    .proj-field textarea { resize: vertical; min-height: 54px; }
    .proj-progress-wrap { margin-bottom: 12px; }
    .proj-progress-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; margin-bottom: 5px; }
    .proj-progress-bar { height: 8px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden; }
    .proj-progress-fill { height: 100%; border-radius: 999px; transition: width .4s; }
    .proj-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 12px 0 7px; }
    .proj-metric-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .proj-metric-name { flex: 1; font-size: 13px; background: transparent; border: none; outline: none; font-family: inherit; color: var(--text); border-bottom: 1px solid var(--line); padding-bottom: 2px; box-shadow: none; backdrop-filter: none; border-radius: 0; }
    .proj-metric-val { width: 100px; padding: 5px 8px; border: 1px solid var(--line-solid); border-radius: 7px; font-size: 13px; font-family: inherit; text-align: right; background: rgba(255,255,255,0.58); }
    .proj-risk-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; padding: 9px 11px; background: rgba(220,38,38,0.04); border: 1px solid rgba(220,38,38,0.14); border-radius: 9px; }
    .proj-risk-lvl { font-size: 11px; font-weight: 700; flex-shrink: 0; border: none; background: transparent; cursor: pointer; font-family: inherit; box-shadow: none; padding: 2px 0; }
    .proj-risk-text { flex: 1; font-size: 13px; background: transparent; border: none; outline: none; font-family: inherit; color: var(--text); width: 100%; box-shadow: none; backdrop-filter: none; border-radius: 0; padding: 0; }
    .proj-member-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(99,102,241,0.10); color: #4338ca; border: 1px solid rgba(99,102,241,0.18); border-radius: 999px; padding: 3px 10px; font-size: 12px; font-weight: 600; margin: 2px; }
    .proj-member-chip button { background: transparent; border: none; cursor: pointer; color: #6366f1; font-size: 12px; padding: 0; line-height: 1; box-shadow: none; transform: none; backdrop-filter: none; }

    /* ─── ADD BUTTON ─── */
    .add-btn { padding: 6px 13px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1.5px dashed rgba(140,170,210,0.65); background: rgba(255,255,255,0.40); color: var(--muted); font-weight: 500; transition: all .15s; white-space: nowrap; box-shadow: none; }
    .add-btn:hover { border-color: var(--primary); color: var(--primary); border-style: solid; background: rgba(37,99,235,0.07); transform: none; box-shadow: none; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1080px) {
      .screen.active.crm-layout { flex-direction: column; }
      .sidebar { width: 100%; max-width: 100%; min-width: 0; height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .kpi-grid, .dash-grid, .dash-grid-3, .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .dev-columns { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
      .pg-grid, .pg-grid-2, .proj-grid { grid-template-columns: 1fr; }
      .goal-row { grid-template-columns: 1fr auto; }
      .bell-dropdown { width: 300px; }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const STORAGE_KEY = "staff_crm_v1";
    const TEAM_STORAGE_KEY = "staff_crm_teams_v1";
    const NOTIF_READ_KEY = "staff_crm_notif_read_v1";

    const tabs = [
      { id: "main", title: "1. Основная информация" },
      { id: "load", title: "2. Загрузка" },
      { id: "skills", title: "3. Навыки" },
      { id: "projects", title: "4. История проектов" },
      { id: "extra", title: "5. Дополнительно" },
      { id: "tasks", title: "6. Задачи" },
      { id: "onetoone", title: "7. 1-on-1" },
      { id: "goals", title: "8. Цели" }
    ];
    const gradeOptions = ["Junior", "Middle", "Senior", "Lead", "Principal"];
    const availabilityOptions = ["доступен", "частично", "недоступен"];
    const goalPeriodOptions = ["Q1 2025", "Q2 2025", "Q3 2025", "Q4 2025", "2025 год", "2026 год"];

    const state = {
      employees: [],
      selectedId: null,
      activeTab: "main",
      filters: { search: "", team: "all", availability: "all", sort: "name" },
      screen: "crm",
      teams: [],
      importDraft: null
    };

    // ---- NOTIFICATIONS ----
    let readNotifIds = new Set();

    function loadReadNotifs() {
      try {
        const raw = localStorage.getItem(NOTIF_READ_KEY);
        readNotifIds = new Set(raw ? JSON.parse(raw) : []);
      } catch(e) { readNotifIds = new Set(); }
    }
    function saveReadNotifs() {
      localStorage.setItem(NOTIF_READ_KEY, JSON.stringify([...readNotifIds]));
    }

    function buildNotifications() {
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);
      const in7days = new Date(today.getTime() + 7*24*60*60*1000);
      const in14days = new Date(today.getTime() + 14*24*60*60*1000);
      const notifs = [];

      state.employees.forEach(e => {
        const name = e.fullName;

        // RED: ФОТ просрочен > 12 мес
        const months = monthDiff(e.salaryReviewDate);
        if (months > 12) {
          notifs.push({ id: `fot-overdue-${e.id}`, color: 'red', text: `Пересмотр ФОТ просрочен — ${months} мес без изменений`, employee: name, empId: e.id, tab: 'projects' });
        }

        // RED: просроченные задачи
        (e.tasks || []).forEach((t, i) => {
          if (t.status !== 'выполнена' && t.due && t.due < todayStr) {
            notifs.push({ id: `task-overdue-${e.id}-${i}`, color: 'red', text: `Просроченная задача: «${t.text}» (${t.due})`, employee: name, empId: e.id, tab: 'tasks' });
          }
        });

        // RED: просроченные ИПР
        (e.development || []).forEach((d, i) => {
          if (d.status !== 'выполнено' && d.deadline && d.deadline < todayStr) {
            notifs.push({ id: `ipr-overdue-${e.id}-${i}`, color: 'red', text: `Просроченная зона развития: «${d.zone}» (срок ${d.deadline})`, employee: name, empId: e.id, tab: 'skills' });
          }
        });

        // RED: высокий риск без комментария
        if (e.risk && e.risk.level === 'высокий' && !e.risk.comment) {
          notifs.push({ id: `risk-no-comment-${e.id}`, color: 'red', text: `Высокий риск увольнения без комментария`, employee: name, empId: e.id, tab: 'extra' });
        }

        // YELLOW: ФОТ через 1-3 месяца
        if (months >= 9 && months <= 12) {
          notifs.push({ id: `fot-soon-${e.id}`, color: 'yellow', text: `Пересмотр ФОТ скоро — прошло ${months} мес`, employee: name, empId: e.id, tab: 'projects' });
        }

        // YELLOW: задача истекает через 7 дней
        (e.tasks || []).forEach((t, i) => {
          if (t.status !== 'выполнена' && t.due && t.due >= todayStr) {
            const d = new Date(t.due);
            if (d <= in7days) {
              notifs.push({ id: `task-soon-${e.id}-${i}`, color: 'yellow', text: `Задача истекает через 7 дней: «${t.text}» (${t.due})`, employee: name, empId: e.id, tab: 'tasks' });
            }
          }
        });

        // YELLOW: отпуск через 7 дней
        (e.load.vacations || []).forEach((v, i) => {
          if (v.from && v.from >= todayStr) {
            const d = new Date(v.from);
            if (d <= in7days) {
              notifs.push({ id: `vac-soon-${e.id}-${i}`, color: 'yellow', text: `Уходит в отпуск через 7 дней (${v.from})`, employee: name, empId: e.id, tab: 'load' });
            }
          }
        });

        // YELLOW: 1-on-1 не проводился > 30 дней
        const lastMeeting = e.oneOnOne && e.oneOnOne.history && e.oneOnOne.history[0] && e.oneOnOne.history[0].date ? e.oneOnOne.history[0].date : null;
        if (lastMeeting) {
          const daysSince = Math.floor((today - new Date(lastMeeting)) / (1000*60*60*24));
          if (daysSince > 30) {
            notifs.push({ id: `o2o-overdue-${e.id}`, color: 'yellow', text: `1-on-1 не проводился ${daysSince} дней (последний ${lastMeeting})`, employee: name, empId: e.id, tab: 'onetoone' });
          }
        } else {
          notifs.push({ id: `o2o-never-${e.id}`, color: 'yellow', text: `1-on-1 ещё не проводился`, employee: name, empId: e.id, tab: 'onetoone' });
        }

        // BLUE: день рождения сегодня
        if (e.birthday) {
          const bd = new Date(e.birthday);
          if (!isNaN(bd.getTime())) {
            if (bd.getDate() === today.getDate() && bd.getMonth() === today.getMonth()) {
              notifs.push({ id: `bday-${e.id}-${today.getFullYear()}`, color: 'blue', text: `🎂 Сегодня день рождения!`, employee: name, empId: e.id, tab: 'main' });
            }
          }
        }

        // BLUE: годовщина работы
        if (e.hireDate) {
          const hd = new Date(e.hireDate);
          if (!isNaN(hd.getTime())) {
            if (hd.getDate() === today.getDate() && hd.getMonth() === today.getMonth() && hd.getFullYear() !== today.getFullYear()) {
              const years = today.getFullYear() - hd.getFullYear();
              notifs.push({ id: `anniv-${e.id}-${today.getFullYear()}`, color: 'blue', text: `🎉 Годовщина — ${years} ${years === 1 ? 'год' : years < 5 ? 'года' : 'лет'} в компании!`, employee: name, empId: e.id, tab: 'main' });
            }
          }
        }

        // BLUE: запланированный 1-on-1 сегодня
        if (e.oneOnOne && e.oneOnOne.nextDate === todayStr) {
          notifs.push({ id: `o2o-today-${e.id}`, color: 'blue', text: `1-on-1 запланирован сегодня`, employee: name, empId: e.id, tab: 'onetoone' });
        }
      });

      return notifs;
    }


    function calcRiskScore(e) {
      let score = 0;
      const drivers = [];
      const fotM = monthDiff(e.salaryReviewDate);
      if (fotM > 12) { score += 0.30; drivers.push('Нет пересмотра ФОТ ' + fotM + ' мес.'); }
      else if (fotM > 9) { score += 0.10; drivers.push('Пересмотр ФОТ скоро (' + fotM + ' мес.)'); }
      const load = Number(e.load && e.load.currentPercent) || 0;
      if (load > 100) { score += 0.25; drivers.push('Перегрузка ' + load + '%'); }
      else if (load > 90) { score += 0.12; drivers.push('Высокая загрузка ' + load + '%'); }
      const lastOoo = e.oneOnOne && e.oneOnOne.history && e.oneOnOne.history[0] ? e.oneOnOne.history[0].date : '';
      const ooodays = lastOoo ? Math.floor((new Date() - new Date(lastOoo)) / 864e5) : 9999;
      if (ooodays > 60) { score += 0.20; drivers.push('1-on-1 не было ' + (ooodays===9999?'никогда':ooodays+' дней')); }
      else if (ooodays > 30) { score += 0.08; drivers.push('1-on-1 ' + ooodays + ' дней назад'); }
      const todayStr = new Date().toISOString().slice(0,10);
      const overdueDev = (e.development||[]).filter(d=>d.status!=='выполнено'&&d.deadline&&d.deadline<todayStr).length;
      if (overdueDev > 0) { score += overdueDev * 0.08; drivers.push('Просрочено ИПР: ' + overdueDev); }
      const iprDone = (e.development||[]).filter(d=>d.status==='выполнено').length;
      const iprTotal = (e.development||[]).length;
      if (iprTotal > 0 && (iprDone/iprTotal) < 0.4) { score += 0.12; drivers.push('ИПР выполнен < 40%'); }
      const manScore = Number(e.managerRating && e.managerRating.score) || 3;
      if (manScore <= 2) { score += 0.15; drivers.push('Низкая оценка руководителя (' + manScore + '/5)'); }
      score = Math.min(1, score);
      let level = 'low';
      if (score >= 0.6) level = 'high';
      else if (score >= 0.35) level = 'medium';
      return { score: Math.round(score * 100), level, drivers };
    }
    function riskBadge(level, score) {
      const cfg = {
        high:   { label:'Высокий', bg:'rgba(220,38,38,0.12)',   color:'#991b1b', border:'rgba(220,38,38,0.25)' },
        medium: { label:'Средний', bg:'rgba(217,119,6,0.12)',   color:'#92400e', border:'rgba(217,119,6,0.25)' },
        low:    { label:'Низкий',  bg:'rgba(5,150,105,0.10)',   color:'#065f46', border:'rgba(5,150,105,0.20)' }
      };
      const c = cfg[level] || cfg.low;
      return `<span style="background:${c.bg};color:${c.color};border:1px solid ${c.border};border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700;">${c.label} ${score}%</span>`;
    }

    function capacityForecast(e, targetMonth) {
      const year = targetMonth.getFullYear();
      const month = targetMonth.getMonth();
      const dim = daysInMonth(year, month);
      const workDays = Math.round((dim * 5) / 7);
      const ms = new Date(year, month, 1);
      const me = new Date(year, month, dim);
      let vacDays = 0;
      (e.load && e.load.vacations || []).forEach(p => {
        if (!p.from || !p.to) return;
        const pf = new Date(p.from), pt = new Date(p.to);
        if (!overlapsPeriod(pf, pt, ms, me)) return;
        const from = pf < ms ? ms : pf, to = pt > me ? me : pt;
        vacDays += Math.floor((to - from) / 864e5) + 1;
      });
      (e.load && e.load.sickLeaves || []).forEach(p => {
        if (!p.from || !p.to) return;
        const pf = new Date(p.from), pt = new Date(p.to);
        if (!overlapsPeriod(pf, pt, ms, me)) return;
        const from = pf < ms ? ms : pf, to = pt > me ? me : pt;
        vacDays += Math.floor((to - from) / 864e5) + 1;
      });
      const realCap = Math.max(0, workDays - vacDays);
      const plannedLoad = Math.round(realCap * ((Number(e.load && e.load.nextMonthPlan) || 0) / 100));
      const free = Math.max(0, realCap - plannedLoad);
      const risk = realCap === 0 ? 'none' : (free / realCap) < 0.2 ? 'high' : (free / realCap) < 0.4 ? 'med' : 'ok';
      return { workDays, vacDays, realCap, plannedLoad, free, risk };
    }

    function busFactor() {
      return state.employees.filter(e =>
        (e.skills || []).filter(s => Number(s.level) >= 4).length < 2

    function overdueDensity() {
      let total = 0, overdue = 0;
      const todayStr = new Date().toISOString().slice(0,10);
      state.employees.forEach(e => {
        (e.tasks || []).forEach(t => {
          if (t.status !== 'выполнена') {
            total++;
            if (t.due && t.due < todayStr) overdue++;
          }
        });
      });
      return total > 0 ? Math.round((overdue / total) * 100) : 0;
    }

    function buildAutoAgenda(e) {
      const items = [];
      const todayStr = new Date().toISOString().slice(0,10);
      const fotM = monthDiff(e.salaryReviewDate);
      if (fotM >= 10) items.push('Обсудить пересмотр ФОТ (' + fotM + ' мес. без изменений)');
      const load = Number(e.load && e.load.currentPercent) || 0;
      if (load > 90) items.push('Загрузка ' + load + '% — обсудить приоритеты');
      const overdueTasks = (e.tasks||[]).filter(t=>t.status!=='выполнена'&&t.due&&t.due<todayStr);
      if (overdueTasks.length) items.push('Просроченные задачи: ' + overdueTasks.length + ' шт.');
      const overdueDev = (e.development||[]).filter(d=>d.status!=='выполнено'&&d.deadline&&d.deadline<todayStr);
      if (overdueDev.length) items.push('Просроченные цели ИПР: ' + overdueDev.map(d=>d.zone).join(', '));
      const rs = calcRiskScore(e);
      if (rs.level === 'high') items.push('Высокий риск увольнения — обсудить мотивацию');
      const openGoals = (e.goals||[]).filter(g=>g.status==='в работе'&&(Number(g.progress)||0)<30);
      if (openGoals.length) items.push('Цели с низким прогрессом: ' + openGoals.length + ' шт.');
      if (e.promotionReadiness === 'готов сейчас') items.push('Готов к повышению — обсудить план');
      return items;
    }

      const notifs = buildNotifications();
      const unread = notifs.filter(n => !readNotifIds.has(n.id));
      const badge = document.getElementById('bellBadge');
      badge.textContent = unread.length > 9 ? '9+' : unread.length;
      badge.classList.toggle('visible', unread.length > 0);

      const list = document.getElementById('bellList');
      if (!notifs.length) {
        list.innerHTML = '<div class="notif-empty">Нет уведомлений</div>';
        return;
      }

      const sorted = [...notifs].sort((a, b) => {
        const order = { red: 0, yellow: 1, blue: 2 };
        const readDiff = (readNotifIds.has(a.id) ? 1 : 0) - (readNotifIds.has(b.id) ? 1 : 0);
        if (readDiff !== 0) return readDiff;
        return (order[a.color] || 0) - (order[b.color] || 0);
      });

      list.innerHTML = sorted.map(n => {
        const read = readNotifIds.has(n.id);
        return `<div class="notif-item${read ? ' read' : ''}" data-notif-id="${n.id}" data-emp-id="${n.empId}" data-tab="${n.tab}">

            <div class="notif-meta">${escapeHtml(n.employee)}</div>
          </div>
          <button class="notif-read-btn" data-mark-read="${n.id}">${read ? '✓' : 'Прочитано'}</button>
        </div>`;
      }).join('');
    }

      if (!dateStr) return 0;
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return 0;
      const now = new Date();
      return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth());

      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);

    }

    async function saveState() {
      // Save to localStorage as backup
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ employees: state.employees, selectedId: state.selectedId }));
      showSaveIndicator();
      // Save to Supabase
      try {
        await fetch(SUPABASE_URL + '/rest/v1/crm_state?id=eq.main', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            data: { employees: state.employees, selectedId: state.selectedId, teams: state.teams, personal: state.personal, projects: state.projects, targetSkills: state.targetSkills },
            updated_at: new Date().toISOString()
          })
        });
      } catch(e) { console.warn('Supabase save failed:', e); }
    }
    function selectedEmployee() { return state.employees.find(e => e.id === state.selectedId) || null; }
    function filteredEmployees() {
      const q = state.filters.search.trim().toLowerCase();
      let arr = state.employees.filter(e => {
        const mSearch = !q || e.fullName.toLowerCase().includes(q);
        const mTeam = state.filters.team === "all" || e.team === state.filters.team;
        const mStatus = state.filters.availability === "all" || e.load.status === state.filters.availability;
        return mSearch && mTeam && mStatus;
      });
      if (state.filters.sort === "name") arr.sort((a,b) => a.fullName.localeCompare(b.fullName,"ru"));
      if (state.filters.sort === "review") arr.sort((a,b) => new Date(a.salaryReviewDate)-new Date(b.salaryReviewDate));
      if (state.filters.sort === "load") arr.sort((a,b) => b.load.currentPercent-a.load.currentPercent);
      return arr;
    }

    function renderEmployeeList() {
      const list = document.getElementById("employeeList");
      const arr = filteredEmployees();
      if (!arr.length) { list.innerHTML = '<div class="empty">Сотрудники не найдены.</div>'; return; }
      list.innerHTML = arr.map(e => {
        const m = monthDiff(e.salaryReviewDate);
        const alertClass = reviewAlertClass(m);
        return `<div class="employee-card ${e.id===state.selectedId?"active":""}" data-emp-card="${e.id}">
          <div class="avatar" style="background:${avatarColor(e.fullName)}">${initials(e.fullName)}</div>

    function inputField(label,key,value,type="text") {
      return `<div class="field"><label>${label}</label><input data-field="${key}" type="${type}" value="${escapeHtml(value)}" /></div>`;
    }
    function selectField(label,key,value,options) {
      return `<div class="field"><label>${label}</label><select data-field="${key}">${options.map(o=>`<option ${o===value?"selected":""}>${o}</option>`).join("")}</select></div>`;
    }
    function textAreaField(label,key,value) {
      return `<div class="field"><label>${label}</label><textarea data-field="${key}">${escapeHtml(value)}</textarea></div>`;
    }
    function stars(level) {
      const l = Math.max(1,Math.min(5,Number(level)||1));
      return "●".repeat(l)+"○".repeat(5-l);
    }
    function tableFromRows(headers,rowsHtml,addBtnKey,addBtnText) {
      return `<table><thead><tr>${headers.map(h=>"<th>"+h+"</th>").join("")}</tr></thead><tbody>${rowsHtml||`<tr><td colspan="${headers.length}" class="muted">Нет данных</td></tr>`}</tbody></table><button data-add-row="${addBtnKey}">${addBtnText}</button>`;
    }

    function setByPath(obj,path,value) {
      const parts = path.split(".");
      let cur = obj;
      for (let i=0;i<parts.length-1;i++) cur=cur[parts[i]];
      cur[parts[parts.length-1]] = value;
    }
    function autoTyped(value,typeHint) {
      if (typeHint==="number") return Number(value||0);
      return value;
    }

    function addRow(type) {
      const e = selectedEmployee(); if (!e) return;
      if (type==="project") e.load.projects.push("");
      if (type==="vacation") e.load.vacations.push({from:"",to:""});
      if (type==="sick") e.load.sickLeaves.push({from:"",to:""});
      if (type==="skill") e.skills.push({name:"",level:1,comment:""});
      if (type==="dev") e.development.push({zone:"",activities:"",deadline:"",mentor:"",status:"в работе"});
      if (type==="ph") e.projectHistory.push({period:"",project:"",role:"",result:""});
      if (type==="sh") e.salaryHistory.push({date:"",from:0,to:0,reason:""});
      if (type==="mc") e.managerComments.unshift({date:new Date().toISOString().slice(0,10),text:""});
      if (type==="doc") e.documents.push({title:"",url:""});
      if (type==="task") e.tasks.push({text:"",due:"",status:"открыта"});
      if (type==="o2o") e.oneOnOne.history.unshift({date:"",topics:"",notes:"",agreements:""});
      if (type==="goal") { ensureGoalsFields(e); e.goals.push({period:e.goalsCurrentPeriod||currentGoalPeriod(),title:"",priority:"средний",due:"",progress:0,status:"в работе",comment:""}); }
      saveState(); renderAll();
    }
    function delRow(type,index) {
      const e = selectedEmployee(); if (!e) return;
      const i = Number(index);
      if (type==="project") e.load.projects.splice(i,1);
      if (type==="vacation") e.load.vacations.splice(i,1);
      if (type==="sick") e.load.sickLeaves.splice(i,1);
      if (type==="skill") e.skills.splice(i,1);
      if (type==="dev") e.development.splice(i,1);
      if (type==="ph") e.projectHistory.splice(i,1);
      if (type==="sh") e.salaryHistory.splice(i,1);
      if (type==="mc") e.managerComments.splice(i,1);
      if (type==="doc") e.documents.splice(i,1);
      if (type==="task") e.tasks.splice(i,1);
      if (type==="o2o") e.oneOnOne.history.splice(i,1);
      if (type==="goal") e.goals.splice(i,1);
      saveState(); renderAll();

      const fotOverdue = employees.map(e=>({e,months:monthDiff(e.salaryReviewDate)})).filter(x=>x.months>12).sort((a,b)=>b.months-a.months);

      const underloaded = employees.filter(e=>(Number(e.load.currentPercent)||0)<60).sort((a,b)=>(Number(a.load.currentPercent)||0)-(Number(b.load.currentPercent)||0)).slice(0,8);
      const taskRows = [];

    function renderCalendar() {
      const root = document.getElementById("calendarBody");
      const employees = state.employees;
      const today = new Date();
      const todayStr = today.toISOString().slice(0,10);
      const calStart = new Date(today.getFullYear(),today.getMonth(),1);
      const calEnd = new Date(today.getFullYear(),today.getMonth()+3,0);
      const daysSpan = Math.max(1,Math.floor((calEnd-calStart)/(24*60*60*1000))+1);
      const monthLabels = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
      const monthHeaders = [];
      const dayHeaders = [];
      for (let i=0;i<daysSpan;i++) {
        const d = new Date(calStart); d.setDate(calStart.getDate()+i);
        if (d.getDate()===1) monthHeaders.push({idx:i,label:monthLabels[d.getMonth()]+" "+d.getFullYear()});
        dayHeaders.push(d.getDate());
      }
      let rowsHtml = `<div class="cal-cell cal-head cal-name">Сотрудник</div>`;
      for (let i=0;i<daysSpan;i++) rowsHtml+=`<div class="cal-cell cal-head">${dayHeaders[i]}</div>`;
      employees.forEach(e=>{
        rowsHtml+=`<div class="cal-cell cal-name">${escapeHtml(e.fullName)}</div>`;
        for (let i=0;i<daysSpan;i++) {
          const d=new Date(calStart); d.setDate(calStart.getDate()+i);
          const dStr=d.toISOString().slice(0,10);
          let cls="cal-cell";
          const vac=(e.load.vacations||[]).find(p=>p.from&&p.to&&dStr>=p.from&&dStr<=p.to);
          const sick=(e.load.sickLeaves||[]).find(p=>p.from&&p.to&&dStr>=p.from&&dStr<=p.to);
          if (vac) cls+=" cal-vac";
          if (sick) cls+=" cal-sick";
          if (dStr===todayStr) cls+=" cal-today";
          rowsHtml+=`<div class="${cls}"></div>`;
        }
      });
      const year=today.getFullYear();
      const monthCapacityRows=employees.map(e=>{
        const monthCells=[];
        for (let m=0;m<12;m++) {
          const dim=daysInMonth(year,m);
          const workDays=Math.round((dim*5)/7);
          const ms=new Date(year,m,1), me=new Date(year,m,dim);
          let daysOff=0;
          [...(e.load.vacations||[]),...(e.load.sickLeaves||[])].forEach(p=>{
            if (!p.from||!p.to) return;
            const pf=new Date(p.from),pt=new Date(p.to);
            if (!overlapsPeriod(pf,pt,ms,me)) return;
            const from=pf<ms?ms:pf, to=pt>me?me:pt;
            daysOff+=Math.floor((to-from)/(24*60*60*1000))+1;
          });
          monthCells.push(Math.max(0,workDays-daysOff));
        }
        return {e,monthCells};
      });
      const totalsByMonth=new Array(12).fill(0);
      monthCapacityRows.forEach(r=>r.monthCells.forEach((v,i)=>{totalsByMonth[i]+=v;}));
      const nowVacation=employees.filter(e=>(e.load.vacations||[]).some(isCurrentInRange));
      const inTwoWeeks=new Date(today.getTime()+14*24*60*60*1000);
      const upcomingVacation=employees.filter(e=>(e.load.vacations||[]).some(p=>{ if (!p.from) return false; const d=new Date(p.from); return d>=today&&d<=inTwoWeeks; }));
      const cm=today.getMonth();
      const currentMonthTeamCap=totalsByMonth[cm]||0;
      const currentMonthTeamMax=employees.reduce((sum)=>sum+Math.round((daysInMonth(year,cm)*5)/7),0);
      const currentMonthTeamPct=currentMonthTeamMax?Math.round((currentMonthTeamCap/currentMonthTeamMax)*100):0;

      root.innerHTML = `
        <section class="panel">
          <div class="section-title">Блок 1 — Календарь отпусков команды</div>
          <div class="muted">Период: ${monthLabels[calStart.getMonth()]} ${calStart.getFullYear()} — ${monthLabels[calEnd.getMonth()]} ${calEnd.getFullYear()}</div>
          <div class="calendar-grid">${rowsHtml}</div>
        </section>
        <section class="panel">
          <div class="section-title">Блок 2 — Планирование capacity по месяцам</div>
          <table><thead><tr><th>Сотрудник</th><th>Команда</th>${monthLabels.map(m=>`<th>${m.slice(0,3)}</th>`).join("")}</tr></thead><tbody>
            ${monthCapacityRows.map(r=>`<tr><td>${escapeHtml(r.e.fullName)}</td><td>${escapeHtml(r.e.team)}</td>${r.monthCells.map(v=>`<td class="${v<10?"capacity-low":""}">${v}</td>`).join("")}</tr>`).join("")}
            <tr><td><b>Итого</b></td><td><b>—</b></td>${totalsByMonth.map(v=>`<td><b>${v}</b></td>`).join("")}</tr>
          </tbody></table>
        </section>
        <section class="panel">
          <div class="section-title">Блок 3 — Сводка по текущему месяцу</div>
          <div class="dash-grid">
            <div><div class="section-title"><span class="badge warn">Сейчас в отпуске</span></div><ul class="list">${nowVacation.map(e=>`<li>${escapeHtml(e.fullName)}</li>`).join("")||"<li>Нет</li>"}</ul></div>
            <div><div class="section-title"><span class="badge good">Уходят в отпуск в ближайшие 2 недели</span></div><ul class="list">${upcomingVacation.map(e=>`<li>${escapeHtml(e.fullName)}</li>`).join("")||"<li>Нет запланированных уходов</li>"}</ul></div>
          </div>
          <div class="kpi-grid">
            <div class="kpi"><div>Capacity команды (текущий месяц)</div><div class="v">${currentMonthTeamCap} ЧД</div></div>
            <div class="kpi ${currentMonthTeamPct<60?"danger":currentMonthTeamPct<80?"warn":"good"}"><div>Доступность команды</div><div class="v">${currentMonthTeamPct}%</div></div>
          </div>
        </section>`;
    }

    function startImportFlow(file) {
      if (!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try {
          const wb=XLSX.read(ev.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
          if (!rows.length) return alert("Файл пустой");
          const headers=rows[0].map(x=>String(x||"").trim());
          const records=rows.slice(1).filter(r=>r.some(v=>String(v||"").trim()!==""));
          state.importDraft={fileName:file.name,headers,records};
          renderImportModal();
        } catch(e) { alert("Не удалось прочитать файл"); }
      };
      reader.readAsArrayBuffer(file);
    }

    function renderImportModal() {
      const draft=state.importDraft; if (!draft) return;
      const systemFields=[
        {key:"fullName",label:"ФИО *"},{key:"role",label:"Должность *"},{key:"team",label:"Команда *"},
        {key:"employeeNumber",label:"Табельный номер"},{key:"email",label:"Email"},
        {key:"hireDate",label:"Дата приёма"},{key:"location",label:"Локация"},
        {key:"grade",label:"Грейд"},{key:"salary",label:"Оклад"}
      ];
      if (!draft.mapping) draft.mapping={};
      const options=`<option value="">— не выбрано —</option>`+draft.headers.map((h,i)=>`<option value="${i}">${escapeHtml(h||("Колонка "+(i+1)))}</option>`).join("");
      document.getElementById("importMeta").textContent=`Файл: ${draft.fileName} · колонок: ${draft.headers.length} · строк: ${draft.records.length}`;
      document.getElementById("importMapping").innerHTML=systemFields.map(f=>`<div class="field"><label>${f.label}</label><select data-import-map="${f.key}">${options}</select></div>`).join("");
      systemFields.forEach(f=>{ const el=document.querySelector(`[data-import-map="${f.key}"]`); if (el) el.value=typeof draft.mapping[f.key]==="number"?String(draft.mapping[f.key]):""; });

    // ─── HOTKEYS ───────────────────────────────────────────────────
    let _hotkeyBuf = '';
    let _hotkeyTimer = null;
    document.addEventListener('keydown', ev => {
      // Ignore if typing in input/textarea/select
      const tag = ev.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      const k = ev.key.toLowerCase();
      // Single keys
      if (k === 'n' && !ev.metaKey && !ev.ctrlKey) { addEmployee(); return; }
      if (k === '?' ) { showHotkeysHelp(); return; }
      // Tab shortcuts 1-8
      if (/^[1-8]$/.test(k) && state.screen === 'crm' && state.selectedId) {
        const tabIds = ['main','load','skills','projects','extra','tasks','onetoone','goals'];
        state.activeTab = tabIds[+k - 1];
        renderEmployeePanel();
        return;
      }
      // g + key combos
      _hotkeyBuf += k;
      if (_hotkeyTimer) clearTimeout(_hotkeyTimer);
      _hotkeyTimer = setTimeout(() => { _hotkeyBuf = ''; }, 600);
      if (_hotkeyBuf === 'ge') { state.screen='crm'; renderAll(); _hotkeyBuf=''; }
      else if (_hotkeyBuf === 'gd') { state.screen='dashboard'; renderAll(); _hotkeyBuf=''; }
      else if (_hotkeyBuf === 'gp') { state.screen='projects'; renderProjects(); renderAll(); _hotkeyBuf=''; }
      else if (_hotkeyBuf === 'gl') { state.screen='personal'; renderPersonal(); renderAll(); _hotkeyBuf=''; }
      else if (_hotkeyBuf === 'gc') { state.screen='calendar'; renderAll(); _hotkeyBuf=''; }
      else if (_hotkeyBuf === 'gv') { state.screen='development'; renderAll(); _hotkeyBuf=''; }
    });

          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;width:80px;">g + e</td><td style="padding:4px 8px;">Сотрудники (CRM)</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">g + d</td><td style="padding:4px 8px;">Дашборд</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">g + p</td><td style="padding:4px 8px;">Проекты</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">g + l</td><td style="padding:4px 8px;">Личное</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">g + c</td><td style="padding:4px 8px;">Календарь</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">g + v</td><td style="padding:4px 8px;">Развитие</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">1 … 8</td><td style="padding:4px 8px;">Вкладки карточки</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">n</td><td style="padding:4px 8px;">Новый сотрудник</td></tr>
          <tr><td style="padding:4px 8px;font-family:monospace;background:rgba(0,0,0,0.06);border-radius:5px;">?</td><td style="padding:4px 8px;">Эта подсказка</td></tr>
        </table>
        <div style="text-align:right;margin-top:16px;"><button onclick="this.closest('[style]').remove()" style="padding:7px 16px;">Закрыть</button></div>
      </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    loadReadNotifs();
    (async () => {
      await loadState();
      loadTeams();
      renderAll();
    })();
  </script>
</body>
</html>
